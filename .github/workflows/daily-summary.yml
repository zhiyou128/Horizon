name: Daily AI News Push

on:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间8点
  workflow_dispatch:      # 允许手动触发

jobs:
  daily-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run Horizon
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: uv run horizon --hours 24

      - name: Set current date
        run: echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Push to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          MESSAGE="【AI资讯日报】${{ env.TODAY }}

🔥 今日AI热点（自动生成）

来源：机器之心 | 量子位 | 36kr | HackerNews | Reddit

完整日报：https://zhiyou128.github.io/Horizon/"

          curl -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$MESSAGE\"}}"

      - name: Commit generated content
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📝 Daily Summary: ${{ env.TODAY }}"
          file_pattern: "docs/_posts/*"
